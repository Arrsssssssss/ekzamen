var cur=0,ct=0,pt=0,ua=[];
var TOTAL=106;
function startQuiz(){
  cur=0;ct=0;pt=0;ua=[];
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('result-screen').className='result-wrap';
  showQ();
}
function showQ(){
  var q=quizData[cur];
  document.getElementById('bar').style.width=(cur/quizData.length*100)+'%';
  document.getElementById('qn').textContent='Вопрос '+(cur+1)+' из '+quizData.length;
  document.getElementById('sc').textContent=ct+' / '+pt;
  document.getElementById('badge').textContent='Вопрос '+q.num+' из '+TOTAL;
  document.getElementById('qtitle').textContent=q.title;
  document.getElementById('nbtn').className='nbtn';
  document.getElementById('nbtn').textContent=cur+1<quizData.length?'Следующий вопрос ->':'Завершить и получить текст';
  var area=document.getElementById('points-area');
  area.innerHTML='';
  var answered=[];
  var chosen=[];
  for(var k=0;k<q.points.length;k++){answered.push(false);chosen.push(-1);}
  for(var pi=0;pi<q.points.length;pi++){
    (function(pidx){
      var p=q.points[pidx];
      var block=document.createElement('div');
      block.className='point-block';
      var ptxt=document.createElement('div');
      ptxt.className='point-text';
      ptxt.textContent=p.text;
      block.appendChild(ptxt);
      for(var oi=0;oi<p.options.length;oi++){
        (function(oidx){
          var btn=document.createElement('button');
          btn.className='opt';
          btn.textContent=p.options[oidx];
          btn.onclick=function(){
            if(answered[pidx])return;
            answered[pidx]=true;chosen[pidx]=oidx;pt++;
            var ok=(oidx===p.correct);if(ok)ct++;
            var btns=block.querySelectorAll('.opt');
            for(var b=0;b<btns.length;b++){
              btns[b].classList.add('disabled');
              if(b===p.correct)btns[b].classList.add('correct');
              else if(b===oidx&&!ok)btns[b].classList.add('wrong');
            }
            document.getElementById('sc').textContent=ct+' / '+pt;
            var done=true;
            for(var k2=0;k2<answered.length;k2++){if(!answered[k2]){done=false;break;}}
            if(done){ua.push({qIdx:cur,chosen:chosen.slice()});document.getElementById('nbtn').className='nbtn show';}
          };
          block.appendChild(btn);
        })(oi);
      }
      area.appendChild(block);
    })(pi);
  }
}
function nextQ(){cur++;if(cur>=quizData.length)showResult();else showQ();}
function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').className='result-wrap show';
  var pct=Math.round(ct/pt*100);
  document.getElementById('fin-score').textContent=ct+' / '+pt;
  document.getElementById('fin-sub').textContent=pct+'% правильных ответов';
  var m='';
  if(pct>=90)m='Отлично! Готов к экзамену!';
  else if(pct>=70)m='Хорошо! Повторите слабые темы.';
  else if(pct>=50)m='Ещё нужно поработать.';
  else m='Повторите материал.';
  document.getElementById('fin-msg').textContent=m;
  var area=document.getElementById('answers-area');area.innerHTML='';
  for(var i=0;i<ua.length;i++){
    var u=ua[i];var q=quizData[u.qIdx];
    var block=document.createElement('div');block.className='ans-block';
    var num=document.createElement('div');num.className='ans-num';num.textContent='Вопрос '+q.num;block.appendChild(num);
    var title=document.createElement('div');title.className='ans-qtitle';title.textContent=q.title;block.appendChild(title);
    for(var pi=0;pi<q.points.length;pi++){
      var p=q.points[pi];var ok=(u.chosen[pi]===p.correct);
      var para=document.createElement('div');para.className='ans-para '+(ok?'ans-ok':'ans-miss');
      para.textContent=(ok?'+ ':'- ')+p.options[p.correct];block.appendChild(para);
    }
    area.appendChild(block);
  }
}
function restart(){startQuiz();}
startQuiz();
