var questions=[{"num": "28", "title": "Принципы организации государственного аппарата", "answer": "Основные принципы:\n\n• законность;\n\n• разделение властей;\n\n• профессионализм;\n\n• ответственность;\n\n• открытость деятельности органов власти."}, {"num": "29", "title": "Разделение власти", "answer": "Разделение властей — принцип, по которому государственная власть делится на 3 ветви:\n\n\t1.\tЗаконодательная — принимает законы.\n\n\t2.\tИсполнительная — исполняет законы.\n\n\t3.\tСудебная — осуществляет правосудие.\n\nЦель — не допустить злоупотребления властью."}, {"num": "30", "title": "Органы государства: понятие и признаки", "answer": "Государственный орган — часть механизма государства, которая выполняет функции власти.\n\nПризнаки:\n\n• создан государством;\n\n• имеет полномочия;\n\n• действует от имени государства;\n\n• имеет определенную структуру;\n\n• принимает обязательные решения."}, {"num": "31", "title": "Виды органов государства", "answer": "Государственные органы классифицируются:\n\nПо ветвям власти:\n\n• законодательные;\n\n• исполнительные;\n\n• судебные.\n\nПо уровню:\n\n• федеральные;\n\n• региональные;\n\n• местные.\n\nПо способу формирования:\n\n• выборные;\n\n• назначаемые."}, {"num": "32", "title": "Органы законодательной власти", "answer": "Законодательная власть принимает законы.\n\nГлавный орган в России — Федеральное Собрание РФ.\n\nСостоит из:\n\n• Государственной Думы — принимает законы;\n\n• Совета Федерации — представляет интересы субъектов РФ."}, {"num": "33", "title": "Органы исполнительной власти", "answer": "Исполнительная власть обеспечивает выполнение законов.\n\nОсновные органы:\n\n• Правительство РФ;\n\n• министерства;\n\n• федеральные службы и ведомства.\n\nГлавная задача — управление государством и реализация законов."}, {"num": "34", "title": "Органы судебной власти", "answer": "Судебная власть осуществляет правосудие.\n\nПринципы:\n\n• независимость судов;\n\n• законность;\n\n• равенство всех перед судом.\n\nВиды судов:\n\n• Конституционный суд;\n\n• Верховный суд;\n\n• другие суды."}, {"num": "35", "title": "Государственные органы с особым статусом", "answer": "Это органы, которые имеют специальные полномочия.\n\nПримеры:\n\n• прокуратура;\n\n• Центральный банк;\n\n• избирательные комиссии.\n\nОни выполняют важные государственные функции."}, {"num": "36", "title": "Государственная служба и должность", "answer": "Государственная служба — профессиональная деятельность граждан по обеспечению работы государства.\n\nГосударственная должность — должность в государственном органе с установленными полномочиями.\n\nГосударственный служащий — лицо, выполняющее обязанности на государственной службе."}, {"num": "37", "title": "Государственные организации", "answer": "Государственные организации — учреждения и предприятия, созданные государством.\n\nВиды:\n\n• государственные учреждения (например, образовательные, медицинские);\n\n• государственные предприятия.\n\nОни выполняют общественно важные задачи."}, {"num": "38", "title": "Политическая система общества", "answer": "Политическая система — совокупность организаций и отношений, связанных с политической властью.\n\nЭлементы:\n\n• государство;\n\n• политические партии;\n\n• общественные организации;\n\n• политические нормы и отношения.\n\nФункции:\n\n• управление обществом;\n\n• выражение интересов граждан;\n\n• обеспечение порядка."}, {"num": "39", "title": "Роль государства и права в политической и экономической системах", "answer": "Государство управляет обществом и регулирует важные процессы.\n\nПраво устанавливает правила поведения.\n\nВ экономике право:\n\n• защищает собственность;\n\n• регулирует отношения;\n\n• устанавливает правила предпринимательства."}, {"num": "40", "title": "Государство и церковь", "answer": "Взаимоотношения государства и церкви зависят от формы государства.\n\nСветское государство — религия отделена от власти, все веры равны.\n\nТеократическое государство — религиозная власть влияет на управление государством."}, {"num": "41", "title": "История развития концепции гражданского общества", "answer": "Гражданское общество — это сфера отношений людей и организаций, независимая от государства.\n\nРазвитие идеи:\n\n• в древности появились идеи участия граждан в управлении;\n\n• в Новое время сформировалась идея самостоятельности общества;\n\n• современное понимание связано с защитой прав и свобод человека."}, {"num": "42", "title": "Гражданское общество: понятие и признаки", "answer": "Гражданское общество — это система самостоятельных общественных отношений и организаций.\n\nПризнаки:\n\n• наличие прав и свобод граждан;\n\n• независимость от государства;\n\n• добровольные объединения людей;\n\n• защита интересов личности.\n\nПринципы:\n\n• свобода;\n\n• равенство;\n\n• законность."}, {"num": "43", "title": "Структура гражданского общества", "answer": "Элементы гражданского общества:\n\n• семья;\n\n• общественные организации;\n\n• политические партии;\n\n• средства массовой информации;\n\n• профсоюзы;\n\n• бизнес;\n\n• религиозные объединения.\n\nОни выражают интересы граждан."}, {"num": "44", "title": "Правовое государство", "answer": "Правовое государство — государство, где власть ограничена правом и действует на основе закона.\n\nПринципы:\n\n• верховенство закона;\n\n• разделение властей;\n\n• защита прав и свобод человека;\n\n• ответственность государства перед гражданами."}, {"num": "45", "title": "Цифровое государство", "answer": "Цифровое государство — использование цифровых технологий для работы органов власти и предоставления услуг.\n\nОсновные направления:\n\n• электронные госуслуги;\n\n• цифровые документы;\n\n• электронное управление.\n\nПлюсы:\n\n• удобство;\n\n• скорость получения услуг;\n\n• доступность информации."}, {"num": "46", "title": "Понятие и признаки права", "answer": "Право — система общеобязательных норм, установленных и охраняемых государством.\n\nПризнаки:\n\n• обязательность;\n\n• формальная определенность;\n\n• связь с государством;\n\n• возможность государственного принуждения."}, {"num": "47", "title": "Сущность права", "answer": "Сущность права — его главные свойства и назначение.\n\nВ праве выделяют:\n\nКлассовое начало — выражение интересов определенных социальных групп.\n\nОбщесоциальное начало — защита порядка, справедливости и интересов общества."}, {"num": "48", "title": "Основные теории права", "answer": "Основные подходы:\n\nЕстественно-правовая теория — право связано с природными правами человека.\n\nПозитивистская теория — право создается государством.\n\nСоциологическая теория — право существует в реальных общественных отношениях."}, {"num": "49", "title": "Дискуссионные аспекты правопонимания", "answer": "Главный вопрос — что считать правом.\n\nРазные подходы:\n\n• право как закон;\n\n• право как справедливость;\n\n• право как реальные отношения в обществе.\n\nЕдиного понимания права нет."}, {"num": "50", "title": "Функции права", "answer": "Функции права — основные направления его воздействия на общество.\n\nОсновные:\n\nРегулятивная — регулирует общественные отношения.\n\nОхранительная — защищает права и порядок.\n\nВоспитательная — формирует правовое поведение.\n\nИнформационная — сообщает правила поведения."}, {"num": "51", "title": "Принципы права", "answer": "Принципы права — основные идеи и правила, на которых строится право.\n\nОсновные принципы:\n\n• законность;\n\n• справедливость;\n\n• равенство всех перед законом;\n\n• гуманизм;\n\n• ответственность за вину."}, {"num": "52", "title": "Социальные нормы: понятие и виды", "answer": "Социальные нормы — правила поведения людей в обществе.\n\nВиды:\n\n• правовые — установлены государством;\n\n• моральные — основаны на представлениях о добре и зле;\n\n• обычаи — сложившиеся традиции;\n\n• религиозные — правила веры;\n\n• корпоративные — правила организаций."}, {"num": "53", "title": "Право и мораль", "answer": "Сходства:\n\n• регулируют поведение людей;\n\n• направлены на порядок в обществе.\n\nРазличия:\n\n• право устанавливает государство;\n\n• мораль формируется обществом;\n\n• за нарушение права возможна юридическая ответственность.\n\nОни взаимодействуют и влияют друг на друга."}, {"num": "54", "title": "Норма права: понятие и признаки", "answer": "Норма права — общеобязательное правило поведения, установленное государством.\n\nПризнаки:\n\n• обязательность;\n\n• официальное закрепление;\n\n• действует для всех;\n\n• охраняется государством."}];

var queue = [];
var cur = 0;
var good = [];
var bad = [];
var marked = false;
var weak = false;
var TOTAL = 106;

function startQuiz(isWeak) {
  weak = isWeak;
  if (isWeak) {
    queue = [];
    for (var i = 0; i < questions.length; i++) {
      for (var j = 0; j < bad.length; j++) {
        if (bad[j].num === questions[i].num) { queue.push(questions[i]); break; }
      }
    }
  } else {
    queue = questions.slice();
    good = [];
    bad = [];
  }
  if (queue.length === 0) return;
  cur = 0;
  marked = false;
  show();
}

function show() {
  if (cur >= queue.length) { showResults(); return; }
  var q = queue[cur];
  document.getElementById('bar').style.width = (cur / queue.length * 100) + '%';
  document.getElementById('qn').textContent = 'Вопрос ' + (cur + 1) + ' из ' + queue.length;
  document.getElementById('badge').textContent = 'Вопрос ' + q.num + ' из ' + TOTAL;
  document.getElementById('title').textContent = q.title;
  document.getElementById('ans-txt').textContent = q.answer;
  var plan = plans[q.num] || [q.title];
  var h = '';
  for (var i = 0; i < plan.length; i++) { h += '<div class="pi">' + plan[i] + '</div>'; }
  document.getElementById('plan').innerHTML = h;
  document.getElementById('ans').className = 'ans hide';
  document.getElementById('checks').className = 'checks hide';
  document.getElementById('nbtn').className = 'nbtn hide';
  document.getElementById('sbtn').className = 'sbtn';
  document.getElementById('hint').style.display = 'block';
  var b = document.getElementById('banner');
  if (weak) { b.className = 'banner'; b.textContent = 'Повтор слабых: ' + queue.length + ' вопросов'; }
  else { b.className = 'banner hide'; }
  updateScore();
  marked = false;
}

function updateScore() {
  document.getElementById('sc').innerHTML = '<span style="color:#a8d4a8">+' + good.length + '</span> <span style="color:#d4a8a8">-' + bad.length + '</span>';
}

function reveal() {
  document.getElementById('ans').className = 'ans';
  document.getElementById('checks').className = 'checks';
  document.getElementById('sbtn').className = 'sbtn hide';
  document.getElementById('hint').style.display = 'none';
}

function mark(knew) {
  if (marked) return;
  marked = true;
  var q = queue[cur];
  var k;
  if (knew) {
    bad = bad.filter(function(b){ return b.num !== q.num; });
    var f = false;
    for (k = 0; k < good.length; k++) { if (good[k].num === q.num) f = true; }
    if (!f) good.push(q);
  } else {
    good = good.filter(function(g){ return g.num !== q.num; });
    var f2 = false;
    for (k = 0; k < bad.length; k++) { if (bad[k].num === q.num) f2 = true; }
    if (!f2) bad.push(q);
  }
  updateScore();
  document.getElementById('checks').className = 'checks hide';
  document.getElementById('nbtn').textContent = (cur + 1 < queue.length) ? 'Следующий' : 'Завершить';
  document.getElementById('nbtn').className = 'nbtn';
}

function next() {
  cur++;
  show();
}

function showResults() {
  document.getElementById('study').className = 'hide';
  document.getElementById('results').className = '';
  document.getElementById('t0').className = 'tab';
  document.getElementById('t1').className = 'tab active';
  var pct = Math.round(good.length / questions.length * 100);
  document.getElementById('bigsc').textContent = good.length + ' / ' + questions.length;
  document.getElementById('subsc').textContent = pct + '% знаете';
  var m;
  if (pct >= 90) m = 'Отлично! Готов к экзамену!';
  else if (pct >= 70) m = 'Хорошо! Повторите слабые.';
  else if (pct >= 50) m = 'Ещё нужно поработать.';
  else m = 'Повторите материал.';
  document.getElementById('msgsc').textContent = m;
  var i, h;
  if (bad.length > 0) {
    document.getElementById('badsec').className = '';
    document.getElementById('badtitle').textContent = 'Не знал: ' + bad.length + ' (нажмите чтобы перейти)';
    h = '';
    for (i = 0; i < bad.length; i++) {
      h += '<div class="ri ri-bad" onclick="jump(\'' + bad[i].num + '\')">[' + bad[i].num + '] ' + bad[i].title + '</div>';
    }
    document.getElementById('badlist').innerHTML = h;
    document.getElementById('repbtn').className = 'ab ab-rep';
  } else {
    document.getElementById('badsec').className = 'hide';
    document.getElementById('repbtn').className = 'ab ab-rep hide';
  }
  if (good.length > 0) {
    document.getElementById('goodsec').className = '';
    document.getElementById('goodtitle').textContent = 'Знал: ' + good.length;
    h = '';
    for (i = 0; i < good.length; i++) {
      h += '<div class="ri ri-good">[' + good[i].num + '] ' + good[i].title + '</div>';
    }
    document.getElementById('goodlist').innerHTML = h;
  } else {
    document.getElementById('goodsec').className = 'hide';
  }
}

function jump(num) {
  var idx = -1;
  for (var i = 0; i < questions.length; i++) { if (questions[i].num === num) idx = i; }
  if (idx < 0) return;
  queue = questions.slice();
  weak = false;
  cur = idx;
  marked = false;
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
  show();
}

function doRepeat() {
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
  startQuiz(true);
}

function doAll() {
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
  startQuiz(false);
}

function goStudy() {
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
}

function goStats() {
  showResults();
}

startQuiz(false);
</script>
