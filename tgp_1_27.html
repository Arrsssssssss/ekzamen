<script>
var questions=[{"num": "1", "title": "Предмет теории государства и права. История формирования науки", "answer": "Теория государства и права (ТГП) — это юридическая наука, изучающая общие закономерности возникновения, развития и функционирования государства и права.\n\nПредмет ТГП:\n\n• сущность и признаки государства;\n\n• происхождение и развитие права;\n\n• формы государства;\n\n• правовые нормы, отношения, ответственность;\n\n• общие понятия юридической науки.\n\nТГП сформировалась как самостоятельная наука в XIX веке. Она развивалась на основе философии, истории и юридических знаний. Сейчас является базовой дисциплиной для изучения всех отраслей права."}, {"num": "2", "title": "Место ТГП в системе наук", "answer": "ТГП занимает важное место среди юридических наук, так как изучает общие основы государства и права.\n\nСвязь с другими науками:\n\n• с историей — изучает развитие государства и права;\n\n• с политологией — изучает власть и политические процессы;\n\n• с отраслевыми юридическими науками — дает общие понятия и принципы.\n\nТГП является фундаментальной юридической наукой."}, {"num": "3", "title": "Методологические основы ТГП", "answer": "Методы ТГП — способы изучения государства и права.\n\nОсновные методы:\n\n• диалектический — изучение развития явлений;\n\n• исторический — анализ возникновения и изменений;\n\n• сравнительный — сравнение государств и правовых систем;\n\n• формально-юридический — изучение правовых норм и понятий;\n\n• системный — рассмотрение государства и права как системы."}, {"num": "4", "title": "Власть догосударственного периода", "answer": "До появления государства существовала общественная власть.\n\nЕё особенности:\n\n• принадлежала всему обществу;\n\n• основывалась на авторитете старейшин;\n\n• отсутствовал специальный аппарат управления;\n\n• решения принимались общиной.\n\nГлавная цель — поддержание порядка в коллективе."}, {"num": "5", "title": "Социальные нормы догосударственного периода", "answer": "Социальные нормы — правила поведения людей в обществе.\n\nВ догосударственный период существовали:\n\n• обычаи — привычные правила поведения;\n\n• традиции — передаваемые нормы;\n\n• ритуалы и обряды — правила общественного поведения.\n\nОни обеспечивали порядок без государственного принуждения."}, {"num": "6", "title": "Предпосылки и формы возникновения государства", "answer": "Причины возникновения государства:\n\n• развитие экономики;\n\n• разделение труда;\n\n• появление частной собственности;\n\n• социальное расслоение общества;\n\n• необходимость управления.\n\nФормы возникновения:\n\n• восточный путь (через организацию управления большими территориями);\n\n• европейский путь (через социальное разделение и появление классов)."}, {"num": "7", "title": "Возникновение права", "answer": "Право возникло из-за необходимости регулировать новые общественные отношения.\n\nПричины:\n\n• усложнение общества;\n\n• появление собственности;\n\n• необходимость защиты порядка.\n\nПраво отличается от обычаев тем, что обеспечивается государством."}, {"num": "8", "title": "Основные теории происхождения государства", "answer": "Основные теории:\n\nТеологическая — государство создано Богом.\n\nПатриархальная — государство возникло из семьи.\n\nДоговорная — люди создали государство через общественный договор.\n\nТеория насилия — государство появилось из-за завоеваний.\n\nМатериалистическая — государство возникло из-за разделения общества на классы."}, {"num": "9", "title": "Понятие государства", "answer": "Государство понимается как организация политической власти, которая управляет обществом на определенной территории.\n\nГлавные элементы:\n\n• территория;\n\n• население;\n\n• публичная власть;\n\n• суверенитет."}, {"num": "10", "title": "Признаки государства", "answer": "Основные признаки:\n\n\t1.\tТерритория — определенные границы.\n\n\t2.\tНаселение — люди, проживающие на территории.\n\n\t3.\tПубличная власть — специальные органы управления.\n\n\t4.\tСуверенитет — независимость внутри и вовне.\n\n\t5.\tПраво — система обязательных норм.\n\n\t6.\tНалоги — средства для деятельности государства."}, {"num": "11", "title": "Государственная власть и ее характеристики", "answer": "Государственная власть — это способность государства управлять обществом и обеспечивать выполнение своих решений.\n\nПризнаки:\n\n• публичный характер (осуществляется от имени государства);\n\n• распространяется на всё население;\n\n• имеет специальный аппарат управления;\n\n• использует право и принуждение;\n\n• обладает суверенитетом."}, {"num": "12", "title": "Формационный подход к типологии государства", "answer": "Формационный подход делит государства по общественно-экономическим формациям.\n\nТипы:\n\n• рабовладельческое;\n\n• феодальное;\n\n• капиталистическое;\n\n• социалистическое.\n\nПлюсы: показывает связь государства с экономикой и обществом.\n\nМинусы: слишком упрощает развитие государств, не учитывает особенности разных стран."}, {"num": "13", "title": "Цивилизационный подход", "answer": "Цивилизационный подход рассматривает государство через культуру, религию, традиции и историческое развитие.\n\nПлюсы:\n\n• учитывает особенности народов;\n\n• объясняет разнообразие государств.\n\nМинусы:\n\n• сложнее определить критерии;\n\n• возможна субъективность оценки."}, {"num": "14", "title": "Геополитические факторы развития государства", "answer": "Геополитические факторы — влияние территории и внешних условий на развитие государства.\n\nК ним относятся:\n\n• расположение страны;\n\n• природные ресурсы;\n\n• климат;\n\n• соседние государства;\n\n• международные отношения.\n\nОни влияют на экономику, политику и безопасность."}, {"num": "15", "title": "Форма государства: понятие и элементы", "answer": "Форма государства — это организация государственной власти.\n\nВключает 3 элемента:\n\n\t1.\tФорма правления — как формируются высшие органы власти.\n\n\t2.\tФорма устройства — как разделена территория.\n\n\t3.\tПолитический режим — способы осуществления власти."}, {"num": "16", "title": "Форма государственного правления", "answer": "Форма правления показывает, кто и как осуществляет верховную власть.\n\nВиды:\n\nМонархия — власть принадлежит одному правителю и обычно передается по наследству.\n\nВиды:\n\n• абсолютная;\n\n• ограниченная (конституционная).\n\nРеспублика — органы власти избираются народом.\n\nВиды:\n\n• президентская;\n\n• парламентская;\n\n• смешанная."}, {"num": "17", "title": "Нетрадиционные формы правления", "answer": "Это формы, которые не полностью соответствуют классическим видам.\n\nПримеры:\n\n• выборная монархия;\n\n• сочетание элементов монархии и республики;\n\n• особые исторические формы управления."}, {"num": "18", "title": "Форма государственного устройства", "answer": "Форма государственного устройства — территориальная организация государства.\n\nВиды:\n\nУнитарное государство — единая система власти, части государства не имеют самостоятельности.\n\nФедерация — состоит из субъектов, имеющих определенные права.\n\nКонфедерация — объединение независимых государств."}, {"num": "19", "title": "Нетипичные формы территориального устройства", "answer": "Это особые варианты организации территории.\n\nПримеры:\n\n• содружества государств;\n\n• автономные образования;\n\n• союзы государств.\n\nОни имеют особенности распределения власти между центром и территориями."}, {"num": "20", "title": "Политический режим: понятие и виды", "answer": "Политический режим — способы и методы осуществления государственной власти.\n\nОсновные виды:\n\nДемократический:\n\n• права и свободы граждан;\n\n• выборность власти;\n\n• участие народа в управлении.\n\nАвторитарный:\n\n• власть сосредоточена у одного лидера или группы;\n\n• ограниченная политическая свобода.\n\nТоталитарный:\n\n• полный контроль государства над обществом;\n\n• отсутствие политической свободы."}, {"num": "21", "title": "Особые формы политических режимов", "answer": "Особые режимы — это разновидности политической власти с необычными признаками.\n\nПримеры:\n\nВоенный режим — власть принадлежит военным, часто устанавливается после переворотов.\n\nТеократический режим — власть основана на религиозных принципах, религиозные лидеры участвуют в управлении.\n\nПереходный режим — период изменения политической системы."}, {"num": "22", "title": "Форма российской государственности", "answer": "Россия — это:\n\nФорма правления: смешанная республика.\n\n(Президент имеет широкие полномочия, но действует парламент и правительство.)\n\nФорма устройства: федерация.\n\n(Россия состоит из субъектов Федерации.)\n\nПолитический режим: демократический.\n\nОсновы закреплены в Конституции РФ."}, {"num": "23", "title": "Соотношение типа и формы государства", "answer": "Тип государства — характеристика государства с точки зрения его сущности и исторического развития.\n\nФорма государства — способ организации власти.\n\nСвязь:\n\n• тип показывает содержание государства;\n\n• форма показывает внешнюю организацию."}, {"num": "24", "title": "Функции государства: понятие и содержание", "answer": "Функции государства — основные направления деятельности государства.\n\nОни связаны с задачами государства и показывают, чем оно занимается.\n\nПримеры:\n\n• защита прав граждан;\n\n• обеспечение порядка;\n\n• развитие экономики;\n\n• оборона страны."}, {"num": "25", "title": "Классификация функций государства", "answer": "Функции делятся:\n\nПо сфере деятельности:\n\nВнутренние:\n\n• экономическая;\n\n• социальная;\n\n• правоохранительная;\n\n• экологическая.\n\nВнешние:\n\n• оборона;\n\n• международное сотрудничество;\n\n• защита интересов страны."}, {"num": "26", "title": "Внутренние и внешние функции России", "answer": "Внутренние:\n\n• обеспечение законности;\n\n• развитие экономики;\n\n• социальная защита;\n\n• охрана окружающей среды.\n\nВнешние:\n\n• оборона государства;\n\n• дипломатические отношения;\n\n• обеспечение безопасности."}, {"num": "27", "title": "Механизм государства: понятие и структура", "answer": "Механизм государства — система государственных органов и организаций, через которые осуществляется власть.\n\nСтруктура:\n\n• государственные органы;\n\n• государственные учреждения;\n\n• государственные предприятия;\n\n• служащие."}];

var queue = [];
var cur = 0;
var good = [];
var bad = [];
var marked = false;
var weak = false;
var TOTAL = 106;

function startQuiz(isWeak) {
  weak = isWeak;
  if (isWeak) {
    queue = [];
    for (var i = 0; i < questions.length; i++) {
      for (var j = 0; j < bad.length; j++) {
        if (bad[j].num === questions[i].num) { queue.push(questions[i]); break; }
      }
    }
  } else {
    queue = questions.slice();
    good = [];
    bad = [];
  }
  if (queue.length === 0) return;
  cur = 0;
  marked = false;
  show();
}

function show() {
  if (cur >= queue.length) { showResults(); return; }
  var q = queue[cur];
  document.getElementById('bar').style.width = (cur / queue.length * 100) + '%';
  document.getElementById('qn').textContent = 'Вопрос ' + (cur + 1) + ' из ' + queue.length;
  document.getElementById('badge').textContent = 'Вопрос ' + q.num + ' из ' + TOTAL;
  document.getElementById('title').textContent = q.title;
  document.getElementById('ans-txt').textContent = q.answer;
  var plan = plans[q.num] || [q.title];
  var h = '';
  for (var i = 0; i < plan.length; i++) { h += '<div class="pi">' + plan[i] + '</div>'; }
  document.getElementById('plan').innerHTML = h;
  document.getElementById('ans').className = 'ans hide';
  document.getElementById('checks').className = 'checks hide';
  document.getElementById('nbtn').className = 'nbtn hide';
  document.getElementById('sbtn').className = 'sbtn';
  document.getElementById('hint').style.display = 'block';
  var b = document.getElementById('banner');
  if (weak) { b.className = 'banner'; b.textContent = 'Повтор слабых: ' + queue.length + ' вопросов'; }
  else { b.className = 'banner hide'; }
  updateScore();
  marked = false;
}

function updateScore() {
  document.getElementById('sc').innerHTML = '<span style="color:#a8d4a8">+' + good.length + '</span> <span style="color:#d4a8a8">-' + bad.length + '</span>';
}

function reveal() {
  document.getElementById('ans').className = 'ans';
  document.getElementById('checks').className = 'checks';
  document.getElementById('sbtn').className = 'sbtn hide';
  document.getElementById('hint').style.display = 'none';
}

function mark(knew) {
  if (marked) return;
  marked = true;
  var q = queue[cur];
  var k;
  if (knew) {
    bad = bad.filter(function(b){ return b.num !== q.num; });
    var f = false;
    for (k = 0; k < good.length; k++) { if (good[k].num === q.num) f = true; }
    if (!f) good.push(q);
  } else {
    good = good.filter(function(g){ return g.num !== q.num; });
    var f2 = false;
    for (k = 0; k < bad.length; k++) { if (bad[k].num === q.num) f2 = true; }
    if (!f2) bad.push(q);
  }
  updateScore();
  document.getElementById('checks').className = 'checks hide';
  document.getElementById('nbtn').textContent = (cur + 1 < queue.length) ? 'Следующий' : 'Завершить';
  document.getElementById('nbtn').className = 'nbtn';
}

function next() {
  cur++;
  show();
}

function showResults() {
  document.getElementById('study').className = 'hide';
  document.getElementById('results').className = '';
  document.getElementById('t0').className = 'tab';
  document.getElementById('t1').className = 'tab active';
  var pct = Math.round(good.length / questions.length * 100);
  document.getElementById('bigsc').textContent = good.length + ' / ' + questions.length;
  document.getElementById('subsc').textContent = pct + '% знаете';
  var m;
  if (pct >= 90) m = 'Отлично! Готов к экзамену!';
  else if (pct >= 70) m = 'Хорошо! Повторите слабые.';
  else if (pct >= 50) m = 'Ещё нужно поработать.';
  else m = 'Повторите материал.';
  document.getElementById('msgsc').textContent = m;
  var i, h;
  if (bad.length > 0) {
    document.getElementById('badsec').className = '';
    document.getElementById('badtitle').textContent = 'Не знал: ' + bad.length + ' (нажмите чтобы перейти)';
    h = '';
    for (i = 0; i < bad.length; i++) {
      h += '<div class="ri ri-bad" onclick="jump(\'' + bad[i].num + '\')">[' + bad[i].num + '] ' + bad[i].title + '</div>';
    }
    document.getElementById('badlist').innerHTML = h;
    document.getElementById('repbtn').className = 'ab ab-rep';
  } else {
    document.getElementById('badsec').className = 'hide';
    document.getElementById('repbtn').className = 'ab ab-rep hide';
  }
  if (good.length > 0) {
    document.getElementById('goodsec').className = '';
    document.getElementById('goodtitle').textContent = 'Знал: ' + good.length;
    h = '';
    for (i = 0; i < good.length; i++) {
      h += '<div class="ri ri-good">[' + good[i].num + '] ' + good[i].title + '</div>';
    }
    document.getElementById('goodlist').innerHTML = h;
  } else {
    document.getElementById('goodsec').className = 'hide';
  }
}

function jump(num) {
  var idx = -1;
  for (var i = 0; i < questions.length; i++) { if (questions[i].num === num) idx = i; }
  if (idx < 0) return;
  queue = questions.slice();
  weak = false;
  cur = idx;
  marked = false;
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
  show();
}

function doRepeat() {
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
  startQuiz(true);
}

function doAll() {
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
  startQuiz(false);
}

function goStudy() {
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
}

function goStats() {
  showResults();
}

startQuiz(false);
</script>
