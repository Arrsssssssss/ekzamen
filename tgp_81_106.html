var questions=[{"num": "81", "title": "Фактический состав. Юридические презумпции и фикции", "answer": "Фактический состав — совокупность нескольких юридических фактов, необходимых для возникновения правоотношения.\n\nЮридическая презумпция — предположение, которое признается законом истинным, пока не доказано обратное.\n\nПример: знание закона всеми гражданами.\n\nЮридическая фикция — признание существующего того, чего в действительности может не быть."}, {"num": "82", "title": "Реализация права", "answer": "Реализация права — осуществление правовых норм в поведении людей.\n\nФормы:\n\n• соблюдение — выполнение запретов;\n\n• исполнение — выполнение обязанностей;\n\n• использование — осуществление своих прав;\n\n• применение — деятельность органов власти по реализации права."}, {"num": "83", "title": "Применение права", "answer": "Применение права — деятельность государственных органов по решению конкретных юридических дел.\n\nСубъекты:\n\n• суды;\n\n• органы власти;\n\n• должностные лица.\n\nСтадии:\n\n\t1.\tустановление фактов;\n\n\t2.\tвыбор нормы права;\n\n\t3.\tпринятие решения;\n\n\t4.\tоформление акта."}, {"num": "84", "title": "Акты применения права", "answer": "Акт применения права — официальное решение государственного органа по конкретному делу.\n\nПризнаки:\n\n• принимается компетентным органом;\n\n• обязателен для исполнения;\n\n• относится к конкретным лицам.\n\nПримеры:\n\n• судебное решение;\n\n• приказ;\n\n• приговор."}, {"num": "85", "title": "Пробелы в праве", "answer": "Пробел в праве — отсутствие нормы, необходимой для регулирования отношения.\n\nСпособы решения:\n\nАналогия закона — применение нормы, регулирующей похожие отношения.\n\nАналогия права — решение на основе общих принципов права."}, {"num": "86", "title": "Юридические коллизии", "answer": "Юридическая коллизия — противоречие между правовыми нормами.\n\nСпособы разрешения:\n\n• применяется более высокая по юридической силе норма;\n\n• действует более новая норма;\n\n• применяется специальная норма."}, {"num": "87", "title": "Толкование норм права", "answer": "Толкование права — выяснение и объяснение смысла правовых норм.\n\nВиды:\n\nПо субъекту:\n\n• официальное;\n\n• неофициальное.\n\nПо способу:\n\n• грамматическое;\n\n• логическое;\n\n• системное;\n\n• историческое."}, {"num": "88", "title": "Механизм правового регулирования", "answer": "Механизм правового регулирования — система средств, с помощью которых право воздействует на общество.\n\nЭлементы:\n\n• нормы права;\n\n• правоотношения;\n\n• акты реализации права;\n\n• юридическая ответственность."}, {"num": "89", "title": "Правовые стимулы и ограничения", "answer": "Правовые стимулы — средства, которые поощряют полезное поведение.\n\nПримеры:\n\n• льготы;\n\n• награды;\n\n• преимущества.\n\nПравовые ограничения — средства, которые сдерживают нежелательное поведение.\n\nПримеры:\n\n• запреты;\n\n• обязанности;\n\n• наказания."}, {"num": "90", "title": "Юридический процесс и правовая процедура", "answer": "Юридический процесс — порядок деятельности государственных органов по решению юридических дел.\n\nПравовая процедура — установленная законом последовательность действий.\n\nРазница:\n\n• процесс связан с решением юридических вопросов;\n\n• процедура — общий порядок действий."}, {"num": "91", "title": "Виды юридического процесса и правовых процедур", "answer": "Виды юридического процесса:\n\n• гражданский процесс — рассмотрение гражданских дел;\n\n• уголовный процесс — расследование и рассмотрение преступлений;\n\n• административный процесс — рассмотрение дел об административных нарушениях;\n\n• конституционный процесс — проверка соответствия законов Конституции."}, {"num": "92", "title": "Стадии юридического процесса", "answer": "Основные стадии:\n\n\t1.\tвозбуждение дела;\n\n\t2.\tподготовка материалов;\n\n\t3.\tрассмотрение дела;\n\n\t4.\tпринятие решения;\n\n\t5.\tисполнение решения."}, {"num": "93", "title": "Правомерное поведение", "answer": "Правомерное поведение — поведение, соответствующее нормам права.\n\nВиды:\n\n• социально активное — человек добровольно соблюдает право;\n\n• обычное — соблюдение закона без особых размышлений;\n\n• пассивное — человек не нарушает право, но не проявляет активности;\n\n• маргинальное — соблюдение закона из-за страха наказания."}, {"num": "94", "title": "Правонарушение: понятие и виды", "answer": "Правонарушение — виновное противоправное деяние, за которое предусмотрена юридическая ответственность.\n\nПризнаки:\n\n• противоправность;\n\n• вина;\n\n• вред обществу;\n\n• наказуемость.\n\nВиды:\n\n• преступления;\n\n• проступки."}, {"num": "95", "title": "Состав правонарушения", "answer": "Состав правонарушения включает:\n\n\t1.\tОбъект — общественные отношения, которым причинен вред.\n\n\t2.\tОбъективная сторона — действие, последствия, причинная связь.\n\n\t3.\tСубъект — лицо, совершившее нарушение.\n\n\t4.\tСубъективная сторона — вина, мотив, цель."}, {"num": "96", "title": "Государственное принуждение", "answer": "Государственное принуждение — воздействие государства на людей для соблюдения закона.\n\nПризнаки:\n\n• осуществляется государством;\n\n• основано на законе;\n\n• применяется в установленном порядке."}, {"num": "97", "title": "Виды государственного принуждения", "answer": "Основные виды:\n\n• предупредительные меры — предотвращение нарушений;\n\n• меры пресечения — прекращение незаконных действий;\n\n• юридическая ответственность — наказание за нарушение;\n\n• восстановительные меры — восстановление нарушенного права."}, {"num": "98", "title": "Юридическая ответственность", "answer": "Юридическая ответственность — применение мер государственного воздействия за совершенное правонарушение.\n\nВиды:\n\n• уголовная;\n\n• административная;\n\n• гражданско-правовая;\n\n• дисциплинарная.\n\nОсобенности:\n\n• наступает только за нарушение закона;\n\n• связана с наказанием или обязанностями."}, {"num": "99", "title": "Цели, функции и принципы юридической ответственности", "answer": "Цели:\n\n• наказание нарушителя;\n\n• восстановление справедливости;\n\n• предупреждение новых нарушений.\n\nФункции:\n\n• карательная;\n\n• воспитательная;\n\n• предупредительная.\n\nПринципы:\n\n• законность;\n\n• справедливость;\n\n• вина;\n\n• индивидуальность наказания."}, {"num": "100", "title": "Обстоятельства, исключающие ответственность", "answer": "Это ситуации, когда деяние не считается правонарушением.\n\nПримеры:\n\n• необходимая оборона;\n\n• крайняя необходимость;\n\n• исполнение закона;\n\n• задержание правонарушителя."}, {"num": "101", "title": "Правосознание: понятие, структура, виды", "answer": "Правосознание — отношение людей к праву, законам и правовым явлениям.\n\nСтруктура:\n\n• правовая идеология — знания и взгляды на право;\n\n• правовая психология — чувства и отношение к праву.\n\nВиды:\n\n• индивидуальное;\n\n• групповое;\n\n• общественное."}, {"num": "102", "title": "Правовая культура", "answer": "Правовая культура — уровень развития правовых знаний, отношения к праву и соблюдения законов.\n\nСтруктура:\n\n• знание права;\n\n• уважение к закону;\n\n• правомерное поведение;\n\n• развитие законодательства."}, {"num": "103", "title": "Правовой нигилизм и правовой идеализм", "answer": "Правовой нигилизм — отрицательное отношение к праву и законам.\n\nФормы:\n\n• нарушение законов;\n\n• неуважение к правосудию.\n\nПравовой идеализм — чрезмерная вера в возможности права, когда считается, что один закон может решить все проблемы."}, {"num": "104", "title": "Законность: понятие и принципы", "answer": "Законность — точное соблюдение законов всеми участниками общества.\n\nПринципы:\n\n• верховенство закона;\n\n• равенство всех перед законом;\n\n• обязательность соблюдения норм;\n\n• защита прав граждан."}, {"num": "105", "title": "Правопорядок", "answer": "Правопорядок — состояние общественных отношений, основанное на соблюдении права.\n\nСвязь:\n\n• законность — требование соблюдать законы;\n\n• правопорядок — результат соблюдения законов.\n\nОбщественный порядок шире, потому что включает не только правовые нормы, но и моральные правила."}, {"num": "106", "title": "Гарантии законности и правопорядка", "answer": "Гарантии законности — условия и средства, обеспечивающие соблюдение права.\n\nВиды:\n\nЭкономические:\n\n• стабильная экономика.\n\nПолитические:\n\n• демократия;\n\n• деятельность органов власти.\n\nЮридические:\n\n• эффективные законы;\n\n• работа судов и правоохранительных органов.\n\nСоциальные:\n\n• правовое воспитание граждан."}];
var plans={"81": ["1. Фактический состав — совокупность юридических фактов, необходимых для правовых последствий", "2. Юридическая презумпция — предположение, признаваемое истинным до доказательства обратного", "3. Юридическая фикция — заведомо ложное положение, признаваемое истинным для правовых целей"], "82": ["1. Реализация права — претворение правовых норм в реальное поведение субъектов", "2. Формы: соблюдение (запреты), исполнение (обязанности), использование (права)", "3. Применение права как особая форма реализации через властные органы"], "83": ["1. Применение права — властная деятельность компетентных органов по реализации норм", "2. Стадии: установление фактов, выбор нормы, принятие решения", "3. Особенность — осуществляется специально уполномоченными субъектами (суд, госорганы)"], "84": ["1. Акт применения права — индивидуальный правовой документ, принятый компетентным органом", "2. Признаки: индивидуальный характер, обязательность для конкретных лиц", "3. Примеры: судебное решение, приказ о назначении, постановление о наказании"], "85": ["1. Пробел в праве — отсутствие нормы, регулирующей конкретное общественное отношение", "2. Способы устранения: правотворчество (создание новой нормы)", "3. Способы преодоления: аналогия закона и аналогия права"], "86": ["1. Юридическая коллизия — противоречие между правовыми нормами", "2. Виды коллизий: между актами разной юридической силы, между старым и новым законом", "3. Способы разрешения: иерархия актов, принцип позднейшего закона, специальная норма"], "87": ["1. Толкование норм права — разъяснение смысла и содержания правовых норм", "2. Виды по субъектам: официальное (обязательное) и неофициальное (доктринальное)", "3. Способы толкования: грамматическое, систематическое, историческое, логическое"], "88": ["1. Механизм правового регулирования — система средств, обеспечивающих действие права", "2. Элементы: норма права, правоотношение, акты реализации права", "3. Цель механизма — упорядочивание общественных отношен аконности и реализации правовых норм", "3. Признаки: упорядоченность, стабильность, защищённость прав субъектов"], "106": ["1. Гарантии законности — условия и средства обеспечения соблюдения законов", "2. Общие гарантии: экономические, политические, идеологические условия", "3. Специальные (юридические) гарантии: контроль, надзор, юридическая ответственность"]};

var queue = [];
var cur = 0;
var good = [];
var bad = [];
var marked = false;
var weak = false;
var TOTAL = 106;

function startQuiz(isWeak) {
  weak = isWeak;
  if (isWeak) {
    queue = [];
    for (var i = 0; i < questions.length; i++) {
      for (var j = 0; j < bad.length; j++) {
        if (bad[j].num === questions[i].num) { queue.push(questions[i]); break; }
      }
    }
  } else {
    queue = questions.slice();
    good = [];
    bad = [];
  }
  if (queue.length === 0) return;
  cur = 0;
  marked = false;
  show();
}

function show() {
  if (cur >= queue.length) { showResults(); return; }
  var q = queue[cur];
  document.getElementById('bar').style.width = (cur / queue.length * 100) + '%';
  document.getElementById('qn').textContent = 'Вопрос ' + (cur + 1) + ' из ' + queue.length;
  document.getElementById('badge').textContent = 'Вопрос ' + q.num + ' из ' + TOTAL;
  document.getElementById('title').textContent = q.title;
  document.getElementById('ans-txt').textContent = q.answer;
  var plan = plans[q.num] || [q.title];
  var h = '';
  for (var i = 0; i < plan.length; i++) { h += '<div class="pi">' + plan[i] + '</div>'; }
  document.getElementById('plan').innerHTML = h;
  document.getElementById('ans').className = 'ans hide';
  document.getElementById('checks').className = 'checks hide';
  document.getElementById('nbtn').className = 'nbtn hide';
  document.getElementById('sbtn').className = 'sbtn';
  document.getElementById('hint').style.display = 'block';
  var b = document.getElementById('banner');
  if (weak) { b.className = 'banner'; b.textContent = 'Повтор слабых: ' + queue.length + ' вопросов'; }
  else { b.className = 'banner hide'; }
  updateScore();
  marked = false;
}

function updateScore() {
  document.getElementById('sc').innerHTML = '<span style="color:#a8d4a8">+' + good.length + '</span> <span style="color:#d4a8a8">-' + bad.length + '</span>';
}

function reveal() {
  document.getElementById('ans').className = 'ans';
  document.getElementById('checks').className = 'checks';
  document.getElementById('sbtn').className = 'sbtn hide';
  document.getElementById('hint').style.display = 'none';
}

function mark(knew) {
  if (marked) return;
  marked = true;
  var q = queue[cur];
  var k;
  if (knew) {
    bad = bad.filter(function(b){ return b.num !== q.num; });
    var f = false;
    for (k = 0; k < good.length; k++) { if (good[k].num === q.num) f = true; }
    if (!f) good.push(q);
  } else {
    good = good.filter(function(g){ return g.num !== q.num; });
    var f2 = false;
    for (k = 0; k < bad.length; k++) { if (bad[k].num === q.num) f2 = true; }
    if (!f2) bad.push(q);
  }
  updateScore();
  document.getElementById('checks').className = 'checks hide';
  document.getElementById('nbtn').textContent = (cur + 1 < queue.length) ? 'Следующий' : 'Завершить';
  document.getElementById('nbtn').className = 'nbtn';
}

function next() {
  cur++;
  show();
}

function showResults() {
  document.getElementById('study').className = 'hide';
  document.getElementById('results').className = '';
  document.getElementById('t0').className = 'tab';
  document.getElementById('t1').className = 'tab active';
  var pct = Math.round(good.length / questions.length * 100);
  document.getElementById('bigsc').textContent = good.length + ' / ' + questions.length;
  document.getElementById('subsc').textContent = pct + '% знаете';
  var m;
  if (pct >= 90) m = 'Отлично! Готов к экзамену!';
  else if (pct >= 70) m = 'Хорошо! Повторите слабые.';
  else if (pct >= 50) m = 'Ещё нужно поработать.';
  else m = 'Повторите материал.';
  document.getElementById('msgsc').textContent = m;
  var i, h;
  if (bad.length > 0) {
    document.getElementById('badsec').className = '';
    document.getElementById('badtitle').textContent = 'Не знал: ' + bad.length + ' (нажмите чтобы перейти)';
    h = '';
    for (i = 0; i < bad.length; i++) {
      h += '<div class="ri ri-bad" onclick="jump(\'' + bad[i].num + '\')">[' + bad[i].num + '] ' + bad[i].title + '</div>';
    }
    document.getElementById('badlist').innerHTML = h;
    document.getElementById('repbtn').className = 'ab ab-rep';
  } else {
    document.getElementById('badsec').className = 'hide';
    document.getElementById('repbtn').className = 'ab ab-rep hide';
  }
  if (good.length > 0) {
    document.getElementById('goodsec').className = '';
    document.getElementById('goodtitle').textContent = 'Знал: ' + good.length;
    h = '';
    for (i = 0; i < good.length; i++) {
      h += '<div class="ri ri-good">[' + good[i].num + '] ' + good[i].title + '</div>';
    }
    document.getElementById('goodlist').innerHTML = h;
  } else {
    document.getElementById('goodsec').className = 'hide';
  }
}

function jump(num) {
  var idx = -1;
  for (var i = 0; i < questions.length; i++) { if (questions[i].num === num) idx = i; }
  if (idx < 0) return;
  queue = questions.slice();
  weak = false;
  cur = idx;
  marked = false;
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
  show();
}

function doRepeat() {
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
  startQuiz(true);
}

function doAll() {
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
  startQuiz(false);
}

function goStudy() {
  document.getElementById('results').className = 'hide';
  document.getElementById('study').className = '';
  document.getElementById('t0').className = 'tab active';
  document.getElementById('t1').className = 'tab';
}

function goStats() {
  showResults();
}

startQuiz(false);
</script>
