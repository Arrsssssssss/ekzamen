<script>
var cards=[{"chapter": "Предмет и методология ТГП", "q": "Предмет теории государства и права. История формирования науки", "a": "Юридическая наука об общих закономерностях возникновения, развития и функционирования государства и права. Предмет: сущность государства, происхождение права, формы государства, нормы, отношения, ответственность"}, {"chapter": "Предмет и методология ТГП", "q": "Место ТГП в системе наук", "a": "Фундаментальная юридическая наука. Связана с историей (развитие государства), политологией (власть), отраслевыми науками (даёт общие понятия и принципы)"}, {"chapter": "Предмет и методология ТГП", "q": "Методологические основы ТГП", "a": "Методы: диалектический (развитие явлений), исторический (анализ изменений), сравнительный (сравнение систем), формально-юридический (изучение норм), системный (целостность явлений)"}, {"chapter": "Предмет и методология ТГП", "q": "Власть догосударственного периода", "a": "Общественная власть до появления государства. Принадлежала всему обществу, основывалась на авторитете старейшин, без специального аппарата управления, решения принимались общиной"}, {"chapter": "Предмет и методология ТГП", "q": "Социальные нормы догосударственного периода", "a": "Обычаи, традиции, ритуалы и обряды. Обеспечивали порядок без государственного принуждения. Носили религиозный и моральный характер"}, {"chapter": "Предмет и методология ТГП", "q": "Предпосылки и формы возникновения государства", "a": "Причины: разделение труда, частная собственность, расслоение общества. Восточный путь — управление ирригацией; Европейский — через классовое расслоение"}, {"chapter": "Предмет и методология ТГП", "q": "Возникновение права", "a": "Причины: усложнение общества, появление собственности. Право отличается от обычаев — обеспечивается государственным принуждением, имеет формальную определённость"}, {"chapter": "Происхождение государства", "q": "Основные теории происхождения государства", "a": "Теологическая (от Бога), патриархальная (из семьи), договорная (общественный договор), теория насилия (завоевание), материалистическая (из классового расслоения)"}, {"chapter": "Происхождение государства", "q": "Понятие государства", "a": "Организация политической власти, управляющая обществом на определённой территории. Элементы: территория, население, публичная власть, суверенитет"}, {"chapter": "Происхождение государства", "q": "Признаки государства", "a": "Территория, население, публичная власть (спецаппарат), суверенитет, право (система обязательных норм), налоги (средства для деятельности)"}, {"chapter": "Происхождение государства", "q": "Государственная власть и ее характеристики", "a": "Способность государства управлять обществом и обеспечивать выполнение решений. Публичная, распространяется на всё население, использует право и принуждение, суверенна"}, {"chapter": "Типология государства", "q": "Формационный подход к типологии государства", "a": "Деление по общественно-экономическим формациям (способу производства): рабовладельческое → феодальное → буржуазное → социалистическое государство"}, {"chapter": "Типология государства", "q": "Цивилизационный подход", "a": "Деление по уровню культуры и цивилизации. Учитывает духовные, культурные, национальные особенности. В отличие от формационного — акцент не на экономике"}, {"chapter": "Типология государства", "q": "Геополитические факторы развития государства", "a": "Географическое положение, природные ресурсы, климат влияют на форму государства, экономику и внешнюю политику. Территориальное положение определяет отношения с соседями"}, {"chapter": "Форма государства", "q": "Форма государства: понятие и элементы", "a": "Способ организации и осуществления государственной власти. Три элемента: форма правления + форма государственного устройства + политический режим"}, {"chapter": "Форма государства", "q": "Форма государственного правления", "a": "Монархия (власть по наследству): абсолютная и ограниченная. Республика (власть избирается): президентская, парламентская, смешанная"}, {"chapter": "Форма государства", "q": "Нетрадиционные формы правления", "a": "Отклонения от классических форм: теократическая монархия, суперпрезидентская республика, монархическая республика. Смешанные и переходные формы"}, {"chapter": "Форма государства", "q": "Форма государственного устройства", "a": "Унитарное (единое, без самостоятельных образований), федерация (союз с самостоятельностью субъектов), конфедерация (союз суверенных государств для общих целей)"}, {"chapter": "Форма государства", "q": "Нетипичные формы территориального устройства", "a": "Регионалистское государство (широкая автономия при унитарной форме), содружество, империя. Переходные и нетипичные формы"}, {"chapter": "Форма государства", "q": "Политический режим: понятие и виды", "a": "Демократический (власть народа, гарантии прав), авторитарный (ограниченные права при сохранении свобод), тоталитарный (полный контроль государства)"}, {"chapter": "Форма государства", "q": "Особые формы политических режимов", "a": "Военный режим, теократический режим, гибридный режим. Сочетают элементы демократии и авторитаризма"}, {"chapter": "Форма государства", "q": "Форма российской государственности", "a": "Форма правления — президентская республика. Устройство — федерация. Политический режим — демократический"}, {"chapter": "Форма государства", "q": "Соотношение типа и формы государства", "a": "Тип — характеризует сущность власти (классовый/цивилизационный). Форма — способ организации власти (правление, устройство, режим). Один тип может иметь разные формы"}, {"chapter": "Функции и механизм государства", "q": "Функции государства: понятие и содержание", "a": "Основные направления деятельности государства, отражающие его сущность и назначение. Реализуются через конкретные действия по управлению обществом"}, {"chapter": "Функции и механизм государства", "q": "Классификация функций государства", "a": "По сфере: внутренние и внешние. По продолжительности: постоянные и временные. По значимости: основные и неосновные"}, {"chapter": "Функции и механизм государства", "q": "Внутренние и внешние функции России", "a": "Внутренние: экономическая, социальная, экологическая, охранительная. Внешние: оборона, дипломатия, сотрудничество с другими государствами"}, {"chapter": "Функции и механизм государства", "q": "Механизм государства: понятие и структура", "a": "Система органов и учреждений, реализующих функции государства. Структура: государственные органы + государственные организации + государственный аппарат"}, {"chapter": "Аппарат государства", "q": "Принципы организации государственного аппарата", "a": "Разделение властей, законность, профессионализм, демократизм, гласность, подконтрольность деятельности аппарата"}, {"chapter": "Аппарат государства", "q": "Разделение власти", "a": "Законодательная (принятие законов) + исполнительная (реализация законов) + судебная (разрешение споров). Ветви самостоятельны и контролируют друг друга"}, {"chapter": "Аппарат государства", "q": "Органы государства: понятие и признаки", "a": "Структурное звено механизма государства с властными полномочиями. Создаётся государством, действует от его имени, обладает компетенцией, финансируется из бюджета"}, {"chapter": "Аппарат государства", "q": "Виды органов государства", "a": "По ветвям власти: законодательные, исполнительные, судебные. По образованию: избираемые и назначаемые. По территории: федеральные и региональные"}, {"chapter": "Аппарат государства", "q": "Органы законодательной власти", "a": "В России: Федеральное Собрание (ГД + СФ). Функции: законотворчество, контроль за исполнительной властью, утверждение бюджета"}, {"chapter": "Аппарат государства", "q": "Органы исполнительной власти", "a": "В России: Правительство РФ, федеральные министерства и службы. Функции: исполнение законов, управление экономикой и социальной сферой"}, {"chapter": "Аппарат государства", "q": "Органы судебной власти", "a": "В России: КС, ВС, арбитражные суды, суды общей юрисдикции. Принципы: независимость судей, состязательность, гласность"}, {"chapter": "Аппарат государства", "q": "Государственные органы с особым статусом", "a": "Не входят в классическую систему трёх ветвей: прокуратура, Центральный банк, Счётная палата. Особая компетенция и порядок формирования"}, {"chapter": "Аппарат государства", "q": "Государственная служба и должность", "a": "Государственная служба — профессиональная деятельность по обеспечению полномочий госорганов. Принципы: законность, профессионализм, равный доступ"}, {"chapter": "Аппарат государства", "q": "Государственные организации", "a": "Учреждения и предприятия, созданные государством (образование, здравоохранение). Не обладают властными полномочиями — в отличие от органов государства"}, {"chapter": "Гражданское общество и правовое государство", "q": "Политическая система общества", "a": "Совокупность институтов, осуществляющих политическую власть. Элементы: государство, политические партии, общественные организации"}, {"chapter": "Гражданское общество и правовое государство", "q": "Роль государства и права в политической и экономической системах", "a": "Государство — центральный институт власти. Право — регулятор экономических и политических отношений. Взаимосвязаны и взаимодействуют"}, {"chapter": "Гражданское общество и правовое государство", "q": "Государство и церковь", "a": "Светское государство — отделение церкви (РФ). Теократическое — церковь определяет политику. Государственная религия — официальный статус при светском характере"}, {"chapter": "Гражданское общество и правовое государство", "q": "История развития концепции гражданского общества", "a": "От античности через Просвещение (Локк, Гоббс, Руссо) до современности. Идея сферы жизни, независимой от государственного контроля"}, {"chapter": "Гражданское общество и правовое государство", "q": "Гражданское общество: понятие и признаки", "a": "Сфера самоорганизации граждан вне государственного контроля. Признаки: самостоятельность, добровольность. Основа: частная собственность и свобода деятельности"}, {"chapter": "Гражданское общество и правовое государство", "q": "Структура гражданского общества", "a": "Общественные организации, профсоюзы, СМИ, политические партии, семья, религиозные организации, экономические объединения граждан"}, {"chapter": "Гражданское общество и правовое государство", "q": "Правовое государство", "a": "Государство, ограниченное правом. Признаки: верховенство закона, разделение властей, защита прав человека, взаимная ответственность государства и личности"}, {"chapter": "Гражданское общество и правовое государство", "q": "Цифровое государство", "a": "Использование IT в государственном управлении. Электронное правительство, цифровые услуги для граждан, онлайн-взаимодействие"}, {"chapter": "Право: понятие и теории", "q": "Понятие и признаки права", "a": "Система общеобязательных норм, установленных и охраняемых государством. Признаки: общеобязательность, формальная определённость, системность, принудительное обеспечение"}, {"chapter": "Право: понятие и теории", "q": "Сущность права", "a": "Классовый подход — право выражает интересы господствующего класса. Общесоциальный подход — право служит интересам всего общества"}, {"chapter": "Право: понятие и теории", "q": "Основные теории права", "a": "Естественно-правовая (от природы), нормативистская (система норм независимо от морали), историческая (народный дух), социологическая (реальные правоотношения)"}, {"chapter": "Право: понятие и теории", "q": "Дискуссионные аспекты правопонимания", "a": "Споры о сущности права: тождественны ли право и закон? Соотношение права и морали, права и справедливости"}, {"chapter": "Право: понятие и теории", "q": "Функции права", "a": "Регулятивная (упорядочивание отношений), охранительная (защита от правонарушений), воспитательная (формирование правосознания)"}, {"chapter": "Право: понятие и теории", "q": "Принципы права", "a": "Общеправовые: законность, справедливость, равенство, гуманизм, демократизм, ответственность за виновные деяния"}, {"chapter": "Право: понятие и теории", "q": "Социальные нормы: понятие и виды", "a": "Правовые, моральные, религиозные, корпоративные нормы, обычаи и традиции. Право — разновидность социальных норм"}, {"chapter": "Право: понятие и теории", "q": "Право и мораль", "a": "Общее: оба регулируют поведение. Различие: право обеспечивается государством, мораль — общественным мнением"}, {"chapter": "Норма права", "q": "Норма права: понятие и признаки", "a": "Общеобязательное правило поведения, установленное и охраняемое государством. Признаки: общеобязательность, формальная определённость, неоднократность применения"}, {"chapter": "Норма права", "q": "Структура нормы права", "a": "Гипотеза (условия применения) + диспозиция (само правило) + санкция (последствия нарушения)"}, {"chapter": "Норма права", "q": "Гипотеза нормы права", "a": "Часть нормы, указывающая условия её действия. Виды: простые, сложные, альтернативные"}, {"chapter": "Норма права", "q": "Диспозиция нормы права", "a": "Часть нормы с самим правилом поведения. Виды: управомочивающая, обязывающая, запрещающая"}, {"chapter": "Норма права", "q": "Санкция нормы права", "a": "Часть нормы с последствиями нарушения. Виды: карательные (наказание) и восстановительные (компенсация)"}, {"chapter": "Норма права", "q": "Виды норм права", "a": "По отраслям: конституционные, гражданские, уголовные. По характеру: императивные и диспозитивные. По функциям: регулятивные и охранительные"}, {"chapter": "Норма права", "q": "Норма права и статья нормативного акта", "a": "Норма — логическая структура (гипотеза + диспозиция + санкция). Статья — форма выражения. Одна статья может содержать несколько норм и наоборот"}, {"chapter": "Источники права и правотворчество", "q": "Формы (источники) права", "a": "Нормативно-правовой акт (основной), правовой обычай, судебный прецедент, нормативный договор"}, {"chapter": "Источники права и правотворчество", "q": "Нормативно-правовые акты", "a": "Официальный документ с нормами права. Виды: законы (высшая сила) и подзаконные акты (указы, постановления). Иерархия от Конституции до актов МСУ"}, {"chapter": "Источники права и правотворчество", "q": "Действие норм права во времени, пространстве и по кругу лиц", "a": "Во времени: с вступления в силу до отмены. В пространстве: на территории государства. По кругу лиц: на граждан, иностранцев, юридических лиц"}, {"chapter": "Источники права и правотворчество", "q": "Правотворчество", "a": "Деятельность по созданию, изменению и отмене правовых норм. Принципы: законность, демократизм, научность. Субъекты: органы власти, народ (референдум)"}, {"chapter": "Источники права и правотворчество", "q": "Нормотворчество и законотворчество", "a": "Нормотворчество — создание любых норм. Законотворчество — принятие законов парламентом. Законотворчество — частный случай нормотворчества"}, {"chapter": "Источники права и правотворчество", "q": "Систематизация законодательства", "a": "Упорядочивание нормативных актов. Кодификация — новый единый акт (кодекс). Инкорпорация — объединение без изменения содержания"}, {"chapter": "Источники права и правотворчество", "q": "Юридическая техника", "a": "Приёмы и правила подготовки правовых актов. Требования: ясность, точность, логичность языка, использование юридических терминов и конструкций"}, {"chapter": "Источники права и правотворчество", "q": "Система права", "a": "Внутреннее строение права: отрасли → подотрасли → институты → нормы. Критерии деления: предмет и метод регулирования"}, {"chapter": "Система права и правовые семьи", "q": "Правовые системы и правовые семьи", "a": "Правовая система — право конкретного государства с практикой. Правовая семья — группа систем с общими корнями. Основные: романо-германская, англосаксонская, религиозная"}, {"chapter": "Система права и правовые семьи", "q": "Англосаксонская правовая семья", "a": "Основана на судебном прецеденте. Великобритания, США. Гибкость, индуктивный метод, меньшая роль кодификации"}, {"chapter": "Система права и правовые семьи", "q": "Романо-германская правовая семья", "a": "Основана на писаном законе. Россия, Германия, Франция. Чёткая иерархия актов, ведущая роль доктрины, кодификация"}, {"chapter": "Система права и правовые семьи", "q": "Семья религиозного права", "a": "Нормы основаны на религиозных текстах. Мусульманское право (шариат), индусское право. Тесная связь права с религиозной моралью"}, {"chapter": "Система права и правовые семьи", "q": "Структура системы права", "a": "Отрасли → подотрасли → институты → нормы. Отрасль — крупнейшее подразделение. Институт — группа норм (например, институт собственности)"}, {"chapter": "Система права и правовые семьи", "q": "Отрасли права", "a": "Совокупность норм, регулирующих однородную группу отношений. Критерии деления: предмет (что регулирует) и метод (как регулирует)"}, {"chapter": "Правоотношения", "q": "Правовые отношения", "a": "Общественное отношение, урегулированное нормой права. Признаки: возникает на основе нормы, участники имеют права и обязанности, охраняется государством"}, {"chapter": "Правоотношения", "q": "Субъекты правоотношений", "a": "Физические лица, юридические лица, государство. Правоспособность (способность иметь права) и дееспособность (способность осуществлять права)"}, {"chapter": "Правоотношения", "q": "Содержание правоотношений", "a": "Субъективные права (мера возможного поведения) и юридические обязанности (мера необходимого поведения)"}, {"chapter": "Правоотношения", "q": "Объекты правоотношений", "a": "То, на что направлены права и обязанности. Виды: материальные блага, действия, результаты творчества, личные неимущественные блага"}, {"chapter": "Правоотношения", "q": "Виды правоотношений", "a": "По отраслям: гражданские, уголовные, административные. По характеру: регулятивные и охранительные. По числу участников: простые и сложные"}, {"chapter": "Правоотношения", "q": "Юридические факты", "a": "Конкретное обстоятельство, влекущее правовые последствия. События (независят от воли) и действия (волевые акты: правомерные и неправомерные)"}, {"chapter": "Правоотношения", "q": "Фактический состав. Юридические презумпции и фикции", "a": "Фактический состав — совокупность фактов для последствий. Презумпция — предположение до доказательства обратного. Фикция — ложное положение, признаваемое истинным"}, {"chapter": "Реализация права и юридический процесс", "q": "Реализация права", "a": "Претворение норм в реальное поведение. Формы: соблюдение (запреты), исполнение (обязанности), использование (права), применение (через властные органы)"}, {"chapter": "Реализация права и юридический процесс", "q": "Применение права", "a": "Властная деятельность компетентных органов. Стадии: установление фактов → выбор нормы → принятие решения. Только специально уполномоченные субъекты"}, {"chapter": "Реализация права и юридический процесс", "q": "Акты применения права", "a": "Индивидуальный правовой документ компетентного органа. Признаки: индивидуальный характер, обязательность. Примеры: судебное решение, приказ, постановление"}, {"chapter": "Реализация права и юридический процесс", "q": "Пробелы в праве", "a": "Отсутствие нормы для конкретного отношения. Устранение — правотворчество. Преодоление — аналогия закона (похожая норма) и аналогия права (общие принципы)"}, {"chapter": "Реализация права и юридический процесс", "q": "Юридические коллизии", "a": "Противоречие между нормами. Виды: по иерархии, по времени, общая/специальная. Разрешение: приоритет высшей силы, позднейшего закона, специальной нормы"}, {"chapter": "Реализация права и юридический процесс", "q": "Толкование норм права", "a": "Разъяснение смысла норм. Виды: официальное (обязательное) и неофициальное. Способы: грамматическое, систематическое, историческое, логическое"}, {"chapter": "Реализация права и юридический процесс", "q": "Механизм правового регулирования", "a": "Система средств обеспечения действия права. Элементы: норма → правоотношение → акты реализации. Цель — упорядочивание отношений правовыми средствами"}, {"chapter": "Реализация права и юридический процесс", "q": "Правовые стимулы и ограничения", "a": "Стимулы — побуждение к правомерному поведению (льготы, поощрения). Ограничения — границы поведения (запреты, обязанности)"}, {"chapter": "Реализация права и юридический процесс", "q": "Юридический процесс и правовая процедура", "a": "Юридический процесс — нормативно установленный порядок деятельности по реализации права. Процедура — конкретный порядок действий. Процесс включает несколько процедур"}, {"chapter": "Реализация права и юридический процесс", "q": "Виды юридического процесса и правовых процедур", "a": "Виды процесса: правотворческий, правоприменительный, судебный. Судебный делится на: гражданский, уголовный, административный"}, {"chapter": "Реализация права и юридический процесс", "q": "Стадии юридического процесса", "a": "Последовательные этапы: возбуждение дела → рассмотрение → принятие решения → исполнение. Каждая стадия имеет собственные цели и действия"}, {"chapter": "Правомерное поведение и ответственность", "q": "Правомерное поведение", "a": "Поведение, соответствующее нормам права. Виды: социально активное, привычное, конформистское (за компанией), маргинальное (боязнь наказания)"}, {"chapter": "Правомерное поведение и ответственность", "q": "Правонарушение: понятие и виды", "a": "Виновное противоправное деяние, причиняющее вред. Виды: преступления (уголовно наказуемые) и проступки (административные, гражданские, дисциплинарные)"}, {"chapter": "Правомерное поведение и ответственность", "q": "Состав правонарушения", "a": "Объект (что нарушено) + объективная сторона (само деяние) + субъект (кто совершил) + субъективная сторона (вина: умысел или неосторожность)"}, {"chapter": "Правомерное поведение и ответственность", "q": "Государственное принуждение", "a": "Применение мер воздействия к нарушителям на основе закона. Осуществляется специальными органами. Цель — правопорядок и защита прав"}, {"chapter": "Правомерное поведение и ответственность", "q": "Виды государственного принуждения", "a": "Меры юридической ответственности, меры защиты (восстановление прав), меры пресечения, предупредительные меры (профилактика)"}, {"chapter": "Правомерное поведение и ответственность", "q": "Юридическая ответственность", "a": "Применение мер принуждения за правонарушение. Виды: уголовная, административная, гражданско-правовая, дисциплинарная. Основание — состав правонарушения"}, {"chapter": "Правомерное поведение и ответственность", "q": "Цели, функции и принципы юридической ответственности", "a": "Цели: наказание, восстановление прав, предупреждение. Функции: карательная, восстановительная, воспитательная, превентивная. Принципы: законность, справедливость, неотвратимость"}, {"chapter": "Правомерное поведение и ответственность", "q": "Обстоятельства, исключающие ответственность", "a": "Необходимая оборона, крайняя необходимость, невменяемость, малозначительность деяния, истечение срока давности"}, {"chapter": "Правосознание, законность и правопорядок", "q": "Правосознание: понятие, структура, виды", "a": "Совокупность взглядов людей о праве. Структура: правовая идеология (знания) + правовая психология (чувства). Виды: индивидуальное, групповое, общественное"}, {"chapter": "Правосознание, законность и правопорядок", "q": "Правовая культура", "a": "Уровень развития правосознания и правовой деятельности. Элементы: знание права, уважение к закону, навыки правомерного поведения. Виды: общества, группы, личности"}, {"chapter": "Правосознание, законность и правопорядок", "q": "Правовой нигилизм и правовой идеализм", "a": "Нигилизм — пренебрежительное отношение к праву (неуважение, инфантилизм). Идеализм — переоценка роли права, вера в решение всех проблем через законы"}, {"chapter": "Правосознание, законность и правопорядок", "q": "Законность: понятие и принципы", "a": "Точное и неукоснительное соблюдение законов всеми субъектами. Принципы: единство, всеобщность, гарантированность прав, верховенство закона, неотвратимость ответственности"}, {"chapter": "Правосознание, законность и правопорядок", "q": "Правопорядок", "a": "Состояние общественных отношений, основанное на соблюдении норм права. Результат законности. Признаки: упорядоченность, стабильность, защищённость прав"}, {"chapter": "Правосознание, законность и правопорядок", "q": "Гарантии законности и правопорядка", "a": "Общие: экономические, политические, идеологические условия. Специальные (юридические): контроль, надзор, юридическая ответственность"}];
var chapters=["Предмет и методология ТГП", "Происхождение государства", "Типология государства", "Форма государства", "Функции и механизм государства", "Аппарат государства", "Гражданское общество и правовое государство", "Право: понятие и теории", "Норма права", "Источники права и правотворчество", "Система права и правовые семьи", "Правоотношения", "Реализация права и юридический процесс", "Правомерное поведение и ответственность", "Правосознание, законность и правопорядок"];

var cur = 0;
var flipped = false;
var activeChapter = "Все темы";
var filtered = cards.slice();

function getFiltered() {
  return activeChapter === "Все темы" ? cards : cards.filter(function(c){ return c.chapter === activeChapter; });
}

function render() {
  filtered = getFiltered();
  var card = filtered[cur];
  if (!card) return;

  document.getElementById('chapter-label').textContent = card.chapter;

  var cardEl = document.getElementById('card');
  var labelEl = document.getElementById('card-label');
  var textEl = document.getElementById('card-text');

  if (flipped) {
    cardEl.className = 'card flipped';
    labelEl.textContent = 'Ответ';
    textEl.textContent = card.a;
    document.getElementById('hint').textContent = 'Нажмите снова — вернуть вопрос';
  } else {
    cardEl.className = 'card';
    var globalIdx = cards.indexOf(card) + 1;
    labelEl.textContent = 'Вопрос ' + globalIdx + ' из ' + cards.length;
    textEl.textContent = card.q;
    document.getElementById('hint').textContent = 'Нажмите на карточку — увидеть ответ';
  }

  document.getElementById('nav-count').textContent = (cur + 1) + ' / ' + filtered.length;
  document.getElementById('progress-bar').style.width = ((cur + 1) / filtered.length * 100) + '%';
}

function flip() {
  flipped = !flipped;
  render();
}

function next() {
  filtered = getFiltered();
  cur = (cur + 1) % filtered.length;
  flipped = false;
  render();
}

function prev() {
  filtered = getFiltered();
  cur = (cur - 1 + filtered.length) % filtered.length;
  flipped = false;
  render();
}

function setChapter(ch) {
  activeChapter = ch;
  cur = 0;
  flipped = false;
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.className = 'filter-btn' + (btn.dataset.ch === ch ? ' active' : '');
  });
  render();
}

// Build filters
var filtersEl = document.getElementById('filters');
var allChapters = ["Все темы"].concat(chapters);
allChapters.forEach(function(ch) {
  var btn = document.createElement('button');
  btn.className = 'filter-btn' + (ch === "Все темы" ? ' active' : '');
  btn.dataset.ch = ch;
  btn.textContent = ch;
  btn.onclick = function() { setChapter(ch); };
  filtersEl.appendChild(btn);
});

render();
</script>
